                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">品名</label>
                                                                        <div onClick={() => { if(products.length > 0) { setActiveProductPicker(idx); setProductPickerSearch(''); } }} className={`product-picker-btn ${!p.name ? 'empty' : ''}`}>
                                                                            <span>{p.name || '點擊選擇產品'}</span>
                                                                            <span>▼</span>
                                                                        </div>
                                                                    </div>
                                                                    
                                                                    {/* 規格 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">規格</label>
                                                                        <input value={p.spec} onChange={e=>handleProductChange(idx,'spec',e.target.value)} className="form-input-lg" placeholder="輸入規格" style={{height:'48px'}} />
                                                                    </div>
                                                                    
                                                                    {/* 件數 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">件數</label>
                                                                        <input type="text" inputMode="decimal" value={p.quantity} onFocus={e=>{if(parseFloat(e.target.value)===0)e.target.select()}} onChange={e=>handleProductChange(idx,'quantity',e.target.value.replace(/[^\d.-]/g,''))} className="form-input-lg num-input" style={{height:'48px',color:'#2563eb'}} placeholder="0" />
                                                                    </div>
                                                                    
                                                                    {/* 重量 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">重量 (kg)</label>
                                                                        <input type="text" inputMode="decimal" value={p.weight} onFocus={e=>{if(parseFloat(e.target.value)===0)e.target.select()}} onChange={e=>handleProductChange(idx,'weight',e.target.value.replace(/[^\d.-]/g,''))} className="form-input-lg num-input" style={{height:'48px',color:'#f97316'}} placeholder="0" />
                                                                    </div>
                                                                    
                                                                    {/* 單價 */}
                                                                    {canSeePrice() && (
                                                                        <div className="mb-3">
                                                                            <label className="form-label-lg">單價</label>
                                                                            <input type="text" inputMode="decimal" value={p.unitPrice} onFocus={e=>{if(parseFloat(e.target.value)===0)e.target.select()}} onChange={e=>handleProductChange(idx,'unitPrice',e.target.value.replace(/[^\d.-]/g,''))} className="form-input-lg num-input" style={{height:'48px'}} placeholder="0" />
                                                                        </div>
                                                                    )}
                                                                    
                                                                    {/* 計價方式 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">計價方式</label>
                                                                        <select value={p.pricingMode} onChange={e=>handleProductChange(idx,'pricingMode',e.target.value)} className="form-input-lg" style={{height:'48px'}}>
                                                                            <option value="weight">計重</option>
                                                                            <option value="quantity">計件</option>
                                                                        </select>
                                                                    </div>
                                                                    
                                                                    {/* 批號 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">批號</label>
                                                                        <input value={p.batchNumber} onChange={e=>handleProductChange(idx,'batchNumber',e.target.value)} className="form-input-lg" style={{height:'48px'}} placeholder="輸入批號" />
                                                                    </div>
                                                                    
                                                                    {/* 效期 */}
                                                                    <div className="mb-3">
                                                                        <label className="form-label-lg">效期</label>
                                                                        <input type="date" value={p.expiryDate} onChange={e=>handleProductChange(idx,'expiryDate',e.target.value)} className="form-input-lg" style={{height:'48px'}} />
                                                                    </div>
                                                                    
                                                                    {/* 金額 */}
                                                                    {canSeePrice() && (
                                                                        <div className="bg-emerald-50 p-3 rounded-xl text-center">
                                                                            <div className="text-sm text-emerald-600 mb-1">小計金額</div>
                                                                            <div className="font-bold text-emerald-700 text-xl">${format2(safeNum(p.amount))}</div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                            {(canEditDomesticFull() || canManage()) && <button type="button" onClick={addProductRow} className="w-full py-3 bg-blue-50 text-blue-600 rounded-xl font-bold border-2 border-dashed border-blue-200">+ 新增產品</button>}
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                {/* 附件區塊 */}
                                                <div className={`accordion-section ${openSections.includes('attachments') ? 'active' : ''}`}>
                                                    <div className="accordion-header" onClick={() => setOpenSections(prev => prev.includes('attachments') ? prev.filter(s=>s!=='attachments') : [...prev, 'attachments'])}>
                                                        <div><div className="accordion-title">附件 ({formData.attachments?.length || 0})</div></div>
                                                        <span className="accordion-arrow">▶</span>
                                                    </div>
                                                    <div className="accordion-content">
                                                        <div className="space-y-2">
                                                            {(formData.attachments || []).map((file, idx) => (<div key={idx} className="flex items-center justify-between bg-gray-50 p-3 rounded-lg"><a href={file.url} target="_blank" className="text-blue-600 underline truncate flex-1 mr-2">{file.name}</a>{canUpload() && <button type="button" onClick={() => handleDeleteFile(idx)} className="text-red-500 p-1"><I.Trash2 /></button>}</div>))}
                                                            {canUpload() && (<div className="relative"><input type="file" multiple onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" /><button type="button" className="w-full py-3 bg-white border border-dashed border-gray-300 rounded-lg text-gray-500 font-bold">{uploading ? '上傳中...' : '📎 選擇檔案'}</button></div>)}
                                                        </div>
                                                    </div>
                                                </div>
                                                
                                                {/* 編輯模式按鈕 */}
                                                <div className="flex gap-3 pt-4">
                                                    <button type="button" onClick={()=>setView('list')} className="flex-1 py-4 bg-gray-100 text-gray-600 rounded-xl font-bold text-lg">取消</button>
                                                    <button type="submit" disabled={isSubmitting} className="flex-1 py-4 bg-blue-600 text-white rounded-xl font-bold text-lg shadow-lg">{isSubmitting ? '儲存中...' : '儲存'}</button>
                                                </div>
                                            </div>
                                            
                                            {/* 電腦版：傳統全顯示 */}
                                            <div className="hidden md:block space-y-4">
                                                <div className="bg-white rounded-xl p-3 border border-gray-200 shadow-sm">
                                                    <div className="grid grid-cols-4 gap-2">
                                                        <div><label>進口公司</label><select name="importCompany" value={formData.importCompany} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2">{IMPORT_COMPANIES.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                                        <div><label>櫃號</label><input name="containerNumber" value={formData.containerNumber} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2 font-mono uppercase" placeholder="櫃號" /></div>
                                                        <div><label>船公司</label><input name="shippingCompany" value={formData.shippingCompany} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2" placeholder="船公司" /></div>
                                                        <div><label>到港日</label><input type="date" name="arrivalDate" value={formData.arrivalDate} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2" /></div>
                                                        <div><label>報關行</label><select name="customsBroker" value={formData.customsBroker} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2">{CUSTOMS_BROKERS.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                                                        <div><label>報關單號</label><input name="customsDeclarationNo" value={formData.customsDeclarationNo} onChange={handleInputChange} disabled={!canEditQCFields()} className="w-full input-bg-style rounded-lg p-2" placeholder="報關單號" /></div>
                                                        <div><label>輸入許可證</label><input name="importPermitNo" value={formData.importPermitNo} onChange={handleInputChange} disabled={!canEditQCFields()} className="w-full input-bg-style rounded-lg p-2" placeholder="許可證號" /></div>
                                                        <div><label>廠商</label><input name="supplier" value={formData.supplier} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2" placeholder="廠商" /></div>
                                                        <div><label>廠商序號</label><div className="flex gap-1"><input name="vendorSeqNo" value={formData.vendorSeqNo} onChange={handleInputChange} disabled={!canCreate()} className="flex-1 input-bg-style rounded-lg p-2 font-mono" placeholder="如 26-01" />{canCreate() && <button type="button" onClick={() => setFormData(p => ({...p, vendorSeqNo: generateVendorSeqNo(p.supplier, p.arrivalDate, editingId)}))} className="px-2 bg-blue-100 text-blue-600 rounded-lg text-xs font-bold">自動</button>}</div></div>
                                                        <div><label>產地</label><input list="origins3" name="origin" value={formData.origin} onChange={handleInputChange} disabled={!canCreate()} className="w-full input-bg-style rounded-lg p-2" placeholder="產地" /><datalist id="origins3">{DEFAULT_ORIGINS.map(o=><option key={o} value={o} />)}</datalist></div>
                                                        <div><label>拆櫃地</label><input name="devanningLocation" value={formData.devanningLocation} onChange={handleInputChange} disabled={!canEditWarehouseFields()} className="w-full input-bg-style rounded-lg p-2" placeholder="地點" /></div>
                                                        <div><label>拆櫃日</label><input type="date" name="devanningDate" value={formData.devanningDate} onChange={handleInputChange} disabled={!canEditWarehouseFields()} className="w-full input-bg-style rounded-lg p-2" /></div>
                                                    </div>
                                                </div>
                                                {canSeePrice() && (
                                                    <div className="bg-blue-50 rounded-xl p-3 border border-blue-100 flex flex-wrap items-end gap-3">
                                                        <div className="flex-1 min-w-[140px]"><label>付款條件</label><input value={formData.paymentTerm} disabled className="w-full bg-white border rounded input-bg-style text-xs" /></div>
                                                        {canEditFlightFee() && isForeign(formData) && (<div className="w-24"><label>旅費</label><input type="number" name="flightFee" value={formData.flightFee} onWheel={e=>e.target.blur()} onChange={handleInputChange} className="w-full bg-white border rounded input-bg-style" placeholder="0" /></div>)}
                                                        <div className="flex items-center gap-3 pb-2 ml-auto">
                                                            <label className="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="isPaid" checked={formData.isPaid} onChange={handleInputChange} disabled={!canEditForeignFinance()} className="w-5 h-5 accent-green-600"/><span className="font-bold text-green-700 text-xs">貨款已付</span></label>
                                                            {canEditFlightFee() && isForeign(formData) && <label className="flex items-center gap-1 cursor-pointer"><input type="checkbox" name="flightFeePaid" checked={formData.flightFeePaid} onChange={handleInputChange} disabled={!canEditForeignFinance()} className="w-5 h-5 accent-red-600"/><span className="font-bold text-red-700 text-xs">旅費已付</span></label>}
                                                        </div>
                                                    </div>
                                                )}
                                                <div className="pt-2">
                                                    <div className="flex justify-between items-center mb-2">
                                                        <h3 className={`font-bold text-lg ${validationErrors.products ? 'text-red-600' : 'text-gray-700'}`}>產品明細{validationErrors.products && <span className="text-red-500 text-xs ml-2">(請至少填寫一項品名)</span>}</h3>
                                                        {(canEditDomesticFull() || canManage()) && <button type="button" onClick={addProductRow} className="text-blue-600 font-bold text-sm hover:underline cursor-pointer">+ 新增產品</button>}
                                                    </div>
                                                    <div className="space-y-3">{formData.products.map((p, idx) => (
                                                        <div key={p.id} className={`bg-white border rounded-xl p-3 shadow-sm ${validationErrors.products && idx === 0 ? 'border-red-300' : ''}`}>
                                                            <div className="grid grid-cols-3 gap-2">
                                                                <div onClick={() => { if(products.length > 0) { setActiveProductPicker(idx); setProductPickerSearch(''); } }} className={`input-bg-style rounded p-1 font-bold cursor-pointer flex items-center justify-between ${products.length > 0 ? 'hover:bg-blue-50' : ''}`}><span className={p.name ? 'text-gray-800' : 'text-gray-400'}>{p.name || '點擊選擇品名'}</span>{products.length > 0 && <span className="text-blue-500 text-xs">▼</span>}</div>
                                                                <input value={p.spec} onChange={e=>handleProductChange(idx,'spec',e.target.value)} className="input-bg-style rounded p-1 text-sm" placeholder="規格" />
                                                                <select value={p.pricingMode} onChange={e=>handleProductChange(idx,'pricingMode',e.target.value)} className="input-bg-style rounded p-1 text-sm"><option value="weight">計重</option><option value="quantity">計件</option></select>
                                                                <input type="number" value={p.quantity} onWheel={e=>e.target.blur()} onChange={e=>handleProductChange(idx,'quantity',e.target.value)} className="input-bg-style rounded p-1 text-right font-bold text-blue-600" placeholder="件數" />
                                                                <input type="number" value={p.weight} onWheel={e=>e.target.blur()} onChange={e=>handleProductChange(idx,'weight',e.target.value)} className="input-bg-style rounded p-1 text-right font-bold text-orange-500" placeholder="重量" />
                                                                {canSeePrice() ? (<input type="number" value={p.unitPrice} onWheel={e=>e.target.blur()} onChange={e=>handleProductChange(idx,'unitPrice',e.target.value)} className="input-bg-style rounded p-1 text-right" placeholder="單價" />) : (<div className="input-bg-style rounded p-1 text-right flex items-center justify-end text-gray-300">***</div>)}
                                                                <input value={p.batchNumber} onChange={e=>handleProductChange(idx,'batchNumber',e.target.value)} className="input-bg-style rounded p-1 text-sm" placeholder="批號" />
                                                                <input type="date" value={p.expiryDate} onChange={e=>handleProductChange(idx,'expiryDate',e.target.value)} className="input-bg-style rounded p-1 text-xs" />
                                                                <div className="flex items-center justify-between bg-gray-50 rounded px-2 border border-gray-200">{canSeePrice() ? <span className="font-bold text-emerald-600 text-sm">${format2(safeNum(p.amount))}</span> : <span>***</span>}{(canEditDomesticFull() || canManage()) && (<div className="flex gap-1"><button type="button" onClick={()=>duplicateProductRow(idx)} className="text-gray-400 hover:text-blue-600 p-1"><I.Copy /></button>{formData.products.length > 1 && <button type="button" onClick={()=>removeProductRow(idx)} className="text-gray-400 hover:text-red-600 p-1"><I.Trash2 /></button>}</div>)}</div>
                                                            </div>
                                                        </div>
                                                    ))}</div>
                                                </div>
                                                <div className="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                                    <label className="block text-xs font-bold text-gray-500 mb-2">附件 ({formData.attachments?.length || 0})</label>
                                                    <div className="space-y-2">{(formData.attachments || []).map((file, idx) => (<div key={idx} className="flex items-center justify-between bg-white p-2 rounded border"><a href={file.url} target="_blank" className="text-blue-600 text-xs underline truncate flex-1 mr-2">{file.name}</a>{canUpload() && <button type="button" onClick={() => handleDeleteFile(idx)} className="text-red-500 p-1"><I.Trash2 /></button>}</div>))}</div>
                                                    {canUpload() && (<div className="mt-2 relative"><input type="file" multiple onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" /><button type="button" className="w-full py-2 bg-white border border-dashed border-gray-400 rounded text-gray-500 text-sm font-bold flex items-center justify-center gap-2">{uploading ? '上傳中...' : <><I.Paperclip /> 選擇檔案 (可多選)</>}</button></div>)}
                                                </div>
                                                <div className="flex gap-3 pt-2"><button type="button" onClick={()=>setView('list')} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold">取消</button><button type="submit" disabled={isSubmitting} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">{isSubmitting?'...':'儲存'}</button></div>
                                            </div>
                                        </>
                                    )}
                                </form>
                            </div>
                        )}
                    </main>
                    {/* V79.3: 多選模式底部操作列 */}
                    {selectMode && (
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-50 p-3 pb-safe">
                            <div className="flex items-center justify-between gap-3">
                                <div className="flex items-center gap-3">
                                    <button onClick={toggleSelectAll} className="px-3 py-2 bg-gray-100 rounded-lg text-sm font-bold text-gray-600">
                                        {selectedIds.size === filteredList.length ? '取消全選' : '全選'}
                                    </button>
                                    <span className="text-sm text-gray-500">已選 <span className="font-bold text-blue-600">{selectedIds.size}</span> 個貨櫃</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={cancelSelectMode} className="px-4 py-2 bg-gray-200 rounded-lg font-bold text-gray-600">取消</button>
                                    <button onClick={executeExport} disabled={selectedIds.size === 0} className={`px-4 py-2 rounded-lg font-bold text-white ${selectedIds.size > 0 ? 'bg-blue-600' : 'bg-gray-300'}`}>
                                        匯出 Excel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                    {/* 原底部導航（多選模式時隱藏） */}
                    {!selectMode && <div className="md:hidden fixed bottom-0 w-full bg-white border-t flex z-40 pb-safe h-14"><button onClick={()=>setView('list')} className={`flex-1 flex flex-row items-center justify-center gap-2 ${view==='list'?'text-blue-600':'text-gray-400'}`}><div className="w-6"><I.List /></div><span className="text-xs font-bold">列表</span></button>{userRole !== 'GUEST' && <><button onClick={()=>setView('products')} className={`flex-1 flex flex-row items-center justify-center gap-2 ${view==='products'?'text-blue-600':'text-gray-400'}`}><div className="w-6"><I.Package /></div><span className="text-xs font-bold">產品</span></button><button onClick={()=>setView('stats')} className={`flex-1 flex flex-row items-center justify-center gap-2 ${view==='stats'?'text-blue-600':'text-gray-400'}`}><div className="w-6"><I.Chart /></div><span className="text-xs font-bold">統計</span></button></>}</div>}
                </div>
                </ErrorBoundary>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ContainerApp />);
    </script>
</body>
</html>
